services:
  feax:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DOCS: "false"
    image: fealax:latest
    container_name: feax
    restart: always
    tty: true
    working_dir: /workspace/
    volumes:
      - ./:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    shm_size: 4gb
    mem_limit: 64g
    memswap_limit: 64g
    ipc: private
    environment:
      - DISPLAY=$DISPLAY
      - WAYLAND_DISPLAY=$WAYLAND_DISPLAY
      - XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR
      - PULSE_SERVER=$PULSE_SERVER
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
